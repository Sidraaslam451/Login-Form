<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Form</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="auth-card" id="authCard">

    <!-- Success Toast -->
    <div class="toast" id="toast">
      <div class="toast-icon"><i class="fa-solid fa-check"></i></div>
      <p class="toast-title" id="toastTitle">Welcome back!</p>
      <p class="toast-sub" id="toastSub">You are now signed in.</p>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" id="tabReg" onclick="switchTab('register')">Create account</button>
      <div class="tab-indicator" id="indicator"></div>
    </div>

    <!-- Forms Slider -->
    <div class="forms-wrapper" id="formsWrapper">

      <!-- ── Login Form ── -->
      <div class="form-panel" autoComplete="current-password">
        <h2 class="form-heading">Welcome back</h2>
        <p class="form-sub">Sign in to your account to continue.</p>

        <div class="social-row">
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <div class="divider">or continue with email</div>

        <div class="field">
          <label for="loginUser">Username</label>
          <div class="input-wrap">
            <input type="text" id="loginUser" placeholder="your_username" oninput="clearErr('loginUserErr')" />
            <i class="fa-solid fa-user ico"></i>
          </div>
          <div class="err-msg" id="loginUserErr">
            <i class="fa-solid fa-circle-exclamation"></i><span></span>
          </div>
        </div>

        <div class="field">
          <label for="loginPass">Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPass" placeholder="••••••••" oninput="clearErr('loginPassErr')" />
            <i class="fa-solid fa-eye ico toggle-pass" onclick="togglePass('loginPass', this)"></i>
          </div>
          <div class="err-msg" id="loginPassErr">
            <i class="fa-solid fa-circle-exclamation"></i><span></span>
          </div>
        </div>

        <button class="submit-btn" onclick="handleLogin(this)">
          <span class="btn-label">Sign in</span>
          <span class="spinner"></span>
        </button>

        <div class="switch-link">
          Don't have an account?
          <button onclick="switchTab('register')">Sign up</button>
        </div>
      </div>

      <!-- ── Register Form ── -->
      <div class="form-panel" autoComplete="new-password">
        <h2 class="form-heading">Create account</h2>
        <p class="form-sub">Join us today — it only takes a minute.</p>

        <div class="social-row">
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <div class="divider">or continue with email</div>

        <div class="field">
          <label for="regUser">Username</label>
          <div class="input-wrap">
            <input type="text" id="regUser" placeholder="choose_a_username" oninput="clearErr('regUserErr')" />
            <i class="fa-solid fa-user ico"></i>
          </div>
          <div class="err-msg" id="regUserErr">
            <i class="fa-solid fa-circle-exclamation"></i><span></span>
          </div>
        </div>

        <div class="field">
          <label for="regEmail">Email</label>
          <div class="input-wrap">
            <input type="email" id="regEmail" placeholder="you@example.com" oninput="clearErr('regEmailErr')" />
            <i class="fa-solid fa-envelope ico"></i>
          </div>
          <div class="err-msg" id="regEmailErr">
            <i class="fa-solid fa-circle-exclamation"></i><span></span>
          </div>
        </div>

        <div class="field">
          <label for="regPass">Password</label>
          <div class="input-wrap">
            <input type="password" id="regPass" placeholder="••••••••" oninput="onPassInput()" />
            <i class="fa-solid fa-eye ico toggle-pass" onclick="togglePass('regPass', this)"></i>
          </div>
          <div class="strength-bar">
            <span id="s1"></span>
            <span id="s2"></span>
            <span id="s3"></span>
            <span id="s4"></span>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
          <div class="err-msg" id="regPassErr">
            <i class="fa-solid fa-circle-exclamation"></i><span></span>
          </div>
        </div>

        <button class="submit-btn" onclick="handleRegister(this)">
          <span class="btn-label">Create account</span>
          <span class="spinner"></span>
        </button>

        <div class="switch-link">
          Already have an account?
          <button onclick="switchTab('login')">Sign in</button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
