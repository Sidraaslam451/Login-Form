<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div class="container">
        <input type="radio" id="login-page" name="form-toggle" checked />
        <input type="radio" id="register-page" name="form-toggle" />

        <div class="form-container">
            <div class="form login-form">
                <div class="form-content">
                    <h2>Login</h2>
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required />
                        <i class="fa-solid fa-user icon"></i>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required />
                        <i class="fa-solid fa-lock icon"></i>
                    </div>
                    <button type="submit">Login</button>
                    <p>Don't have an account? <label for="register-page" class="toggle-link">Sign-up</label></p>
                </div>
                <div class="form-sidebar">
                    <h1>Welcome Back!</h1>
                    <p>We're happy to have you with us again. If you need anything, we're here to help.</p>
                </div>
            </div>

            <div class="form register-form">
                <div class="form-content">
                    <h2>Register</h2>
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" name="reg-username" placeholder="Choose a username" required />
                        <i class="fa-solid fa-user icon"></i>
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="reg-email" placeholder="Enter your email" required />
                        <i class="fa-solid fa-envelope icon"></i>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" name="reg-password" placeholder="Create a password" required />
                        <i class="fa-solid fa-lock icon"></i>
                    </div>
                    <button type="submit">Register</button>
                    <p>Already have an account? <label for="login-page" class="toggle-link">Sign-in</label></p>
                </div>
                <div class="form-sidebar">
                    <h1>Welcome!</h1>
                    <p>We're delighted to have you here. If you need any assistance, feel free to reach out.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
